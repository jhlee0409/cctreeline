name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck --severity=warning cctreeline.sh install.sh
      - name: Syntax check
        run: bash -n cctreeline.sh && bash -n install.sh
